name: Bot Cost Report
description: Generate step summary for Claude bot workflow runs

inputs:
  workflow_name:
    description: "Name of the workflow (review, audit, fix)"
    required: true
  event_type:
    description: "GitHub event that triggered the run"
    required: true
  target:
    description: "Issue/PR number (empty for scheduled runs)"
    required: false
    default: ""
  model:
    description: "Claude model used"
    required: false
    default: "opus"

runs:
  using: composite
  steps:
    - name: Generate report
      shell: bash
      env:
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        EVENT_TYPE: ${{ inputs.event_type }}
        TARGET: ${{ inputs.target }}
        MODEL: ${{ inputs.model }}
        RUN_ID: ${{ github.run_id }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        # --- Calculate duration via GitHub API ---
        STARTED_AT=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.run_started_at' 2>/dev/null || echo "")
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        DURATION_SEC=0
        if [[ -n "$STARTED_AT" ]]; then
          START_EPOCH=$(date -d "$STARTED_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$STARTED_AT" +%s 2>/dev/null || echo "0")
          NOW_EPOCH=$(date +%s)
          if [[ "$START_EPOCH" -gt 0 ]]; then
            DURATION_SEC=$(( NOW_EPOCH - START_EPOCH ))
          fi
        fi

        # Format duration as Xm Ys
        DURATION_MIN=$(( DURATION_SEC / 60 ))
        DURATION_REM=$(( DURATION_SEC % 60 ))
        DURATION_FMT="${DURATION_MIN}m ${DURATION_REM}s"

        # --- Determine status ---
        STATUS="${{ job.status }}"
        if [[ -z "$STATUS" ]]; then
          STATUS="unknown"
        fi

        # --- Write Step Summary ---
        {
          echo "## Bot Cost Report"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Workflow | \`${WORKFLOW_NAME}\` |"
          echo "| Event | \`${EVENT_TYPE}\` |"
          if [[ -n "$TARGET" ]]; then
            echo "| Target | #${TARGET} |"
          fi
          echo "| Model | \`${MODEL}\` |"
          echo "| Duration | ${DURATION_FMT} |"
          echo "| Status | \`${STATUS}\` |"
          echo "| Run | [${RUN_ID}](${RUN_URL}) |"
        } >> "$GITHUB_STEP_SUMMARY"
