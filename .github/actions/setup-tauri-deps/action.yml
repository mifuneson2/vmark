name: Setup Tauri system dependencies
description: Install system libraries required for Tauri on Linux (no-op on other platforms)

runs:
  using: composite
  steps:
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          libssl-dev
