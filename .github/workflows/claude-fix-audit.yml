name: Claude Fix Audit Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  fix:
    runs-on: ubuntu-latest
    # Only trigger on issues with "audit" label
    if: contains(github.event.issue.labels.*.name, 'audit')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          allowed_bots: "claude"
          claude_args: "--model opus --allowedTools Bash,Read,Write,Edit,Glob,Grep"

          prompt: |
            You are a senior developer for VMark. An automated audit found the issue below.
            Read AGENTS.md and .claude/rules/ for project conventions before making changes.

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## Instructions

            1. Read and understand the issue thoroughly
            2. Read the affected file(s) and surrounding context
            3. Implement the fix following VMark conventions:
               - TDD: write a failing test FIRST, then fix the code
               - Use design tokens, not hardcoded values
               - Keep files under ~300 lines
               - No Zustand store destructuring in components
               - Use `error instanceof Error` not `as Error`
            4. Run `pnpm test` to verify tests pass (if TypeScript changes)
            5. Run `cargo check --manifest-path src-tauri/Cargo.toml` (if Rust changes)
            6. Create a branch and open a PR that closes #${{ github.event.issue.number }}
            7. Request @xiaolai to review the PR

            If the issue is unclear, too risky, or requires architectural decisions,
            comment on the issue explaining why and do NOT create a PR.

      - name: Bot Cost Report
        if: always()
        uses: ./.github/actions/claude-report
        with:
          workflow_name: "fix"
          event_type: ${{ github.event_name }}
          target: ${{ github.event.issue.number || '' }}
          model: "opus"
