name: Claude Code

on:
  # Auto-review new issues
  issues:
    types: [opened, reopened]

  # PR review on open/update
  pull_request:
    types: [opened, synchronize]

  # Respond to @claude mentions in issues/PRs
  issue_comment:
    types: [created]

  # Respond to @claude in PR review comments
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # Auto-fix audit issues: read the issue, apply the fix, run gates, open a PR
  audit-fix:
    runs-on: ubuntu-latest
    concurrency:
      group: audit-fix-${{ github.event.issue.number }}
      cancel-in-progress: false
    if: >-
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'audit')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model opus --allowedTools Bash Read Write Edit Glob Grep MultiEdit Skill Agent"
          show_full_output: true
          prompt: |
            Fix the audit issue described in GitHub issue #${{ github.event.issue.number }}.

            1. Read issue #${{ github.event.issue.number }} body with `gh issue view ${{ github.event.issue.number }}`
            2. Apply the suggested fix
            3. Run `pnpm check:all` to verify frontend gates pass
            4. If the fix touches Rust code (src-tauri/), also run `cargo check --manifest-path src-tauri/Cargo.toml`
            5. Create a PR that includes `Closes #${{ github.event.issue.number }}` in the body
            6. Enable auto-merge: `gh pr merge --auto --squash`

            If the fix causes test or compilation failures, adjust until gates pass.

  # General Claude Code: review issues, PRs, respond to @claude
  claude:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    if: >-
      (github.event_name == 'issues' && !contains(github.event.issue.labels.*.name, 'audit') && !contains(github.event.issue.labels.*.name, 'cost-report')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && !github.event.comment.performed_via_github_app && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && !github.event.comment.performed_via_github_app && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: "--model opus"

          # PR review: consolidate into one comment, add "Fix this" links
          use_sticky_comment: true
          include_fix_links: true
