name: Claude Code

on:
  # Auto-review new issues (from humans — bot-created issues don't trigger)
  issues:
    types: [opened, reopened]

  # PR review on open/update
  pull_request:
    types: [opened, synchronize]

  # Respond to @claude mentions in issues/PRs
  issue_comment:
    types: [created]

  # Respond to @claude in PR review comments
  pull_request_review_comment:
    types: [created]

  # Trigger audit-fix after the audit workflow creates issues
  # (github-actions[bot] events don't trigger 'issues' — this is the workaround)
  workflow_run:
    workflows: ["Claude Periodic Audit"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  # Auto-fix audit issues: find open audit issues, fix each, open PRs
  # Triggered by workflow_run (after audit creates issues) or by human-opened audit issues
  audit-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: audit-fix
      cancel-in-progress: false
    if: >-
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'audit')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install -g pnpm && pnpm install --frozen-lockfile

      - name: Find open audit issues
        id: find-issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            # Direct issue trigger — use the issue number
            echo "ISSUE_NUMBERS=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_run trigger — find all open audit issues
            NUMBERS=$(gh issue list --state open --label audit --json number --jq '.[].number' | tr '\n' ' ')
            echo "ISSUE_NUMBERS=$NUMBERS" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix audit issues
        if: steps.find-issues.outputs.ISSUE_NUMBERS != ''
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "claude[bot]"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--model opus --max-turns 25 --allowedTools Bash Read Write Edit Glob Grep MultiEdit"
          show_full_output: true
          prompt: |
            Fix the open audit issues. Issue numbers: ${{ steps.find-issues.outputs.ISSUE_NUMBERS }}

            For EACH issue number:
            1. Read the issue: `gh issue view <NUMBER>`
            2. Create a fix branch: `git checkout -b fix/audit-<NUMBER>`
            3. Apply the suggested fix
            4. Run `pnpm check:all` to verify frontend gates pass
            5. If the fix touches Rust code (src-tauri/), also run `cargo check --manifest-path src-tauri/Cargo.toml`
            6. Commit with message: `fix: <issue title> (Closes #<NUMBER>)`
            7. Push and create a PR: `gh pr create --title "fix: <issue title>" --body "Closes #<NUMBER>" --label audit`
            8. Go back to main for the next issue: `git checkout main`

            If a fix causes test failures, adjust until gates pass.
            If an issue is unclear or unfixable, comment on the issue explaining why and move on.

  # General Claude Code: review issues, PRs, respond to @claude
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    if: >-
      (github.event_name == 'issues' && !contains(github.event.issue.labels.*.name, 'audit') && !contains(github.event.issue.labels.*.name, 'cost-report')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && !github.event.comment.performed_via_github_app && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && !github.event.comment.performed_via_github_app && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}

          claude_args: "--model opus --max-turns 15"

          # PR review: consolidate into one comment, add "Fix this" links
          use_sticky_comment: true
          include_fix_links: true

      - name: Enable auto-merge for bot PRs
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.user.login == 'claude[bot]'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --auto --squash 2>&1 || echo "Auto-merge not available for this PR"
