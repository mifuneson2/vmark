name: Claude Code

on:
  # Auto-review new issues
  issues:
    types: [opened]

  # PR review on open/update
  pull_request:
    types: [opened, synchronize]

  # Respond to @claude mentions in issues/PRs
  issue_comment:
    types: [created]

  # Respond to @claude in PR review comments
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    # Skip bot comments to avoid infinite loops
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && !github.event.comment.performed_via_github_app) ||
      (github.event_name == 'pull_request_review_comment' && !github.event.comment.performed_via_github_app)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: "--model opus"

          # PR review: consolidate into one comment, add "Fix this" links
          use_sticky_comment: true
          include_fix_links: true

      - name: Bot Cost Report
        if: always()
        uses: ./.github/actions/claude-report
        with:
          workflow_name: "review"
          event_type: ${{ github.event_name }}
          target: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
          model: "opus"
          execution_file: ${{ steps.claude.outputs.execution_file || '' }}
          gist_token: ${{ secrets.GIST_PAT }}
          gist_id: ${{ vars.BOT_REPORTS_GIST_ID }}
