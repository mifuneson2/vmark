name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - run: pnpm check:all

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf libssl-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-test-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-test-${{ runner.os }}-

      - name: Create sidecar stub for Tauri build script
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            triple="x86_64-pc-windows-msvc"
            ext=".exe"
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            triple="x86_64-unknown-linux-gnu"
            ext=""
          else
            triple="aarch64-apple-darwin"
            ext=""
          fi
          touch "src-tauri/binaries/vmark-mcp-server-${triple}${ext}"

      - run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit (Rust)
        run: cargo audit --deny warnings
        working-directory: src-tauri
        continue-on-error: ${{ github.event_name == 'pull_request' }}
